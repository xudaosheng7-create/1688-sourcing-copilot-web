<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — 1688 Sourcing Copilot</title>
  <meta name="description" content="Get AI-generated English talktracks for 1688 supplier negotiations.">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    code, pre { font-family: 'JetBrains Mono', monospace; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; }
    .markdown-body h1 { font-size: 1.5em; }
    .markdown-body h2 { font-size: 1.25em; }
    .markdown-body h3 { font-size: 1.1em; }
    .markdown-body p { margin: 0.5em 0; }
    .markdown-body ul, .markdown-body ol { margin: 0.5em 0; padding-left: 1.5em; }
    .markdown-body blockquote {
      border-left: 3px solid #f59e0b;
      padding-left: 1em;
      margin: 0.5em 0;
      color: #475569;
      font-style: italic;
    }
    .markdown-body strong { font-weight: 700; }
    .markdown-body code { background: #f1f5f9; padding: 0.125em 0.375em; border-radius: 0.25em; font-size: 0.9em; }
    .markdown-body hr { border-color: #e2e8f0; margin: 1em 0; }
    .dot-typing { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: dot 1.4s infinite; }
    .dot-typing:nth-child(2) { animation-delay: 0.2s; }
    .dot-typing:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
    .msg-enter { animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-slate-200 bg-white">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 hover:opacity-80">
        <span class="text-2xl">🤝</span>
        <span class="font-bold">1688 Sourcing Copilot</span>
      </a>
      <div class="flex items-center gap-4">
        <span id="usageBadge" class="text-xs px-3 py-1 rounded-full bg-slate-100 text-slate-600">Free: <span id="usageCount">5</span>/5 left</span>
        <a href="#pricing" class="px-4 py-2 rounded-lg bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-bold">Upgrade</a>
      </div>
    </div>
  </header>

  <!-- Chat Container -->
  <main class="flex-1 overflow-y-auto">
    <div class="max-w-4xl mx-auto px-6 py-8">

      <!-- Welcome / Starters -->
      <div id="welcomePanel" class="text-center py-12">
        <h1 class="text-3xl font-bold mb-3">Hi! I'm your sourcing copilot 👋</h1>
        <p class="text-slate-600 mb-8">Tell me what stage you're in. I'll generate ready-to-use English talktracks + anti-scam watch-outs.</p>

        <div class="grid md:grid-cols-2 gap-3 max-w-2xl mx-auto text-left">
          <button onclick="useStarter(this)" class="p-4 rounded-xl border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition text-left">
            <div class="text-xs font-semibold text-amber-600 mb-1">FIRST CONTACT</div>
            <div class="text-sm">I need to contact a 1688 supplier for bluetooth earbuds, 500 units, AQL 2.5</div>
          </button>
          <button onclick="useStarter(this)" class="p-4 rounded-xl border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition text-left">
            <div class="text-xs font-semibold text-amber-600 mb-1">NEGOTIATION</div>
            <div class="text-sm">Factory quoted $5/unit for 1000 yoga pants. I want volume pricing.</div>
          </button>
          <button onclick="useStarter(this)" class="p-4 rounded-xl border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition text-left">
            <div class="text-xs font-semibold text-amber-600 mb-1">FACTORY AUDIT</div>
            <div class="text-sm">Help me prepare factory audit questions for clothing supplier</div>
          </button>
          <button onclick="useStarter(this)" class="p-4 rounded-xl border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition text-left">
            <div class="text-xs font-semibold text-amber-600 mb-1">PRODUCTION</div>
            <div class="text-sm">My order is delayed 7 days. How do I push the factory?</div>
          </button>
          <button onclick="useStarter(this)" class="p-4 rounded-xl border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition text-left">
            <div class="text-xs font-semibold text-amber-600 mb-1">INSPECTION</div>
            <div class="text-sm">SGS report shows 8% defect rate, above AQL 2.5</div>
          </button>
          <button onclick="useStarter(this)" class="p-4 rounded-xl border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition text-left">
            <div class="text-xs font-semibold text-amber-600 mb-1">FINAL PAYMENT</div>
            <div class="text-sm">I'm about to release final payment. What should I verify?</div>
          </button>
        </div>
      </div>

      <!-- Chat Messages -->
      <div id="messages" class="space-y-6"></div>

    </div>
  </main>

  <!-- Input Bar -->
  <div class="border-t border-slate-200 bg-white">
    <div class="max-w-4xl mx-auto px-6 py-4">
      <form id="chatForm" class="flex gap-3">
        <textarea
          id="messageInput"
          rows="1"
          placeholder="Describe your sourcing situation... (e.g., 'I need to negotiate price for 1000 yoga pants, factory quoted $5/unit')"
          class="flex-1 resize-none rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-200 max-h-32"
          required></textarea>
        <button
          type="submit"
          id="sendBtn"
          class="px-6 py-3 rounded-xl bg-slate-900 text-white font-semibold hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed">
          Send
        </button>
      </form>
      <p class="text-xs text-slate-500 mt-2 text-center">Press Enter to send · Shift+Enter for new line · Free tier: 5 inquiries/day</p>
    </div>
  </div>

  <script>
    // Minimal markdown renderer (headings, bold, blockquote, lists, code)
    function renderMarkdown(text) {
      // Escape HTML first
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Code blocks ```...```
      html = html.replace(/```([\s\S]*?)```/g, '<pre class="bg-slate-900 text-slate-100 p-3 rounded-lg overflow-x-auto my-2 text-sm"><code>$1</code></pre>');

      // Inline code `...`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Bold
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

      // Blockquote
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

      // Unordered lists
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul class="list-disc pl-5 my-2">' + m + '</ul>');

      // Numbered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // Line breaks
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');

      return '<p>' + html + '</p>';
    }

    // State
    let conversationId = '';
    let messageCount = 0;
    const FREE_LIMIT = 5;

    // Generate or get user ID (simple, for MVP)
    function getUserId() {
      let id = localStorage.getItem('sourcing_user_id');
      if (!id) {
        id = 'u_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
        localStorage.setItem('sourcing_user_id', id);
      }
      return id;
    }

    // Track daily usage
    function checkUsage() {
      const today = new Date().toISOString().slice(0, 10);
      const stored = JSON.parse(localStorage.getItem('sourcing_usage') || '{}');
      if (stored.date !== today) {
        localStorage.setItem('sourcing_usage', JSON.stringify({ date: today, count: 0 }));
        return 0;
      }
      return stored.count || 0;
    }
    function incrementUsage() {
      const today = new Date().toISOString().slice(0, 10);
      const stored = JSON.parse(localStorage.getItem('sourcing_usage') || '{}');
      stored.date = today;
      stored.count = (stored.count || 0) + 1;
      localStorage.setItem('sourcing_usage', JSON.stringify(stored));
      updateUsageBadge();
    }
    function updateUsageBadge() {
      const used = checkUsage();
      const left = Math.max(0, FREE_LIMIT - used);
      document.getElementById('usageCount').textContent = left;
      const badge = document.getElementById('usageBadge');
      if (left === 0) {
        badge.className = 'text-xs px-3 py-1 rounded-full bg-red-100 text-red-700';
        badge.innerHTML = '🚫 Free limit reached';
      } else if (left <= 2) {
        badge.className = 'text-xs px-3 py-1 rounded-full bg-amber-100 text-amber-700';
        badge.innerHTML = `⚠️ ${left} free left`;
      } else {
        badge.className = 'text-xs px-3 py-1 rounded-full bg-slate-100 text-slate-600';
        badge.innerHTML = `Free: <span id="usageCount">${left}</span>/${FREE_LIMIT} left`;
      }
    }

    // UI: Add user message
    function addUserMessage(text) {
      const messages = document.getElementById('messages');
      document.getElementById('welcomePanel')?.remove();
      const div = document.createElement('div');
      div.className = 'flex justify-end msg-enter';
      div.innerHTML = `
        <div class="max-w-2xl bg-slate-900 text-white px-5 py-3 rounded-2xl rounded-tr-sm">
          ${text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')}
        </div>
      `;
      messages.appendChild(div);
      scrollToBottom();
    }

    // UI: Add assistant message (returns div for streaming)
    function addAssistantMessage() {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-enter';
      div.innerHTML = `
        <div class="max-w-3xl bg-white border border-slate-200 px-6 py-4 rounded-2xl rounded-tl-sm shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-lg">🤝</span>
            <span class="text-xs font-semibold text-slate-500">Sourcing Copilot</span>
          </div>
          <div class="markdown-body text-sm leading-relaxed" data-msg-body>
            <span class="dot-typing"></span><span class="dot-typing"></span><span class="dot-typing"></span>
          </div>
        </div>
      `;
      messages.appendChild(div);
      scrollToBottom();
      return div.querySelector('[data-msg-body]');
    }

    function scrollToBottom() {
      const main = document.querySelector('main');
      setTimeout(() => { main.scrollTop = main.scrollHeight; }, 50);
    }

    // Use starter
    function useStarter(btn) {
      const text = btn.querySelector('div:last-child').textContent.trim();
      document.getElementById('messageInput').value = text;
      document.getElementById('chatForm').dispatchEvent(new Event('submit'));
    }

    // Stream SSE from API
    async function streamChat(query) {
      const bodyEl = addAssistantMessage();
      let fullText = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query,
            conversation_id: conversationId,
            user: getUserId(),
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Unknown error' }));
          bodyEl.innerHTML = `<div class="text-red-600">⚠️ ${err.error || 'Request failed'}${err.detail ? ': ' + err.detail : ''}</div>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Dify SSE format: data: {json}\n\n
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]' || !data) continue;

            try {
              const event = JSON.parse(data);
              if (event.event === 'message' || event.event === 'agent_message') {
                fullText += event.answer || '';
                bodyEl.innerHTML = renderMarkdown(fullText);
                scrollToBottom();
              } else if (event.event === 'message_end') {
                if (event.conversation_id) conversationId = event.conversation_id;
              } else if (event.event === 'error') {
                bodyEl.innerHTML = `<div class="text-red-600">⚠️ ${event.message || 'Stream error'}</div>`;
                return;
              }
            } catch (e) {
              console.error('Parse error:', e, data);
            }
          }
        }

        if (!fullText) {
          bodyEl.innerHTML = '<div class="text-slate-500">No response. Try again.</div>';
        }
      } catch (err) {
        console.error('Stream error:', err);
        bodyEl.innerHTML = `<div class="text-red-600">⚠️ Network error: ${err.message}</div>`;
      }
    }

    // Form submit
    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const query = input.value.trim();
      if (!query) return;

      // Check usage
      if (checkUsage() >= FREE_LIMIT) {
        alert('🚫 Free tier limit reached (5/day). Upgrade to Pro for unlimited access.');
        return;
      }

      // Disable input
      input.value = '';
      input.disabled = true;
      sendBtn.disabled = true;

      addUserMessage(query);
      incrementUsage();
      await streamChat(query);

      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    });

    // Auto-resize textarea
    document.getElementById('messageInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 128) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    document.getElementById('messageInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('chatForm').dispatchEvent(new Event('submit'));
      }
    });

    // Init
    updateUsageBadge();
    document.getElementById('messageInput').focus();
  </script>

</body>
</html>
